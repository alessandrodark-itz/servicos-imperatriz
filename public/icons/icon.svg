<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#05010a"/>
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#B18CFF"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fox silhouette simplified -->
  <ellipse cx="256" cy="220" rx="110" ry="120" fill="url(#g1)" filter="url(#glow)" opacity="0.9"/>
  <!-- Ears -->
  <polygon points="180,130 150,60 220,110" fill="#8A5CFF"/>
  <polygon points="332,130 362,60 292,110" fill="#8A5CFF"/>
  <polygon points="182,128 158,75 218,112" fill="#B18CFF" opacity="0.6"/>
  <polygon points="330,128 354,75 294,112" fill="#B18CFF" opacity="0.6"/>
  <!-- Eyes -->
  <ellipse cx="220" cy="210" rx="16" ry="18" fill="#FFB800" filter="url(#glow)"/>
  <ellipse cx="292" cy="210" rx="16" ry="18" fill="#FFB800" filter="url(#glow)"/>
  <ellipse cx="220" cy="212" rx="8" ry="10" fill="#1a0a00"/>
  <ellipse cx="292" cy="212" rx="8" ry="10" fill="#1a0a00"/>
  <!-- Nose -->
  <ellipse cx="256" cy="258" rx="10" ry="7" fill="#1a0520"/>
  <!-- Muzzle accent -->
  <ellipse cx="256" cy="250" rx="45" ry="35" fill="rgba(255,255,255,0.08)"/>
  <!-- Text -->
  <text x="256" y="370" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle" letter-spacing="-2">Serv-</text>
  <text x="256" y="440" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#8A5CFF" text-anchor="middle" letter-spacing="-2" filter="url(#glow)">Itz</text>
  <!-- Neon border glow -->
  <rect x="4" y="4" width="504" height="504" rx="94" fill="none" stroke="#8A5CFF" stroke-width="3" opacity="0.4"/>
</svg>
